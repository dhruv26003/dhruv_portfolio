{% extends "admin/base.html" %}

{% block title %}{% if subtitle %}{{ subtitle }} | {% endif %}{{ title }} | {{ site_title|default:'Portfolio Admin' }}{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}" style="font-family: 'Space Grotesk', sans-serif; letter-spacing: 1px; color: var(--accent-cyan); display: inline-flex; align-items: center; gap: 8px;">
        <span style="color: #38bdf8;">&lt;Dhruv Chavda /&gt;</span> 
        <span style="font-size: 14px; font-weight: normal; color: #9ca3af; border-left: 1px solid rgba(56, 189, 248, 0.3); padding-left: 8px;">Admin Control</span>
    </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* Import fonts to match website */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

    :root {
        /* Colors matching style.css */
        --primary: #38bdf8; /* Cyan Glow */
        --primary-fg: #030712; /* Slate-black text for primary buttons */
        --body-bg: #030712; /* Slate-black body background */
        --body-fg: #f3f4f6; /* Off-white text */
        --body-quiet-color: #9ca3af; /* Muted grey text */
        
        --header-bg: #0b1329; /* Deep dark slate surface */
        --header-color: #38bdf8;
        --header-link-color: #f3f4f6;
        
        --breadcrumbs-bg: #0b1329;
        --breadcrumbs-fg: #9ca3af;
        --breadcrumbs-link-color: #38bdf8;
        
        --link-color: #38bdf8;
        --link-hover-color: #6366f1;
        --link-selected-color: #38bdf8;
        
        --hairline-color: rgba(56, 189, 248, 0.15);
        --border-color: rgba(56, 189, 248, 0.15);
        
        --selected-bg: rgba(56, 189, 248, 0.1);
        --selected-row: rgba(56, 189, 248, 0.05);
        
        --darkened-bg: #0b1329;
        
        --message-success-bg: rgba(74, 222, 128, 0.15);
        --message-success-color: #4ade80;
        --message-warning-bg: rgba(251, 146, 60, 0.15);
        --message-warning-color: #fb923c;
        --message-error-bg: rgba(248, 113, 113, 0.15);
        --message-error-color: #f87171;
    }

    /* Base Styling Overrides */
    body {
        font-family: 'Outfit', sans-serif;
    }
    
    /* Header branding container */
    #header {
        background: var(--header-bg);
        border-bottom: 1px solid rgba(56, 189, 248, 0.25);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }
    
    #header a:hover {
        color: var(--primary) !important;
        text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
    }
    
    #header #user-tools a {
        border-bottom-color: rgba(56, 189, 248, 0.3);
    }
    
    /* Breadcrumbs styling */
    .breadcrumbs {
        background: var(--breadcrumbs-bg);
        border-bottom: 1px solid rgba(56, 189, 248, 0.15);
        padding: 10px 40px;
    }

    /* Modules (Cards) */
    .module {
        background: #0b1329 !important;
        border: 1px solid rgba(56, 189, 248, 0.15);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
        overflow: hidden;
        margin-bottom: 20px;
    }
    
    .module th, .module td {
        border-bottom: 1px solid rgba(56, 189, 248, 0.1) !important;
    }

    .module caption {
        background: rgba(56, 189, 248, 0.1) !important;
        border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        color: var(--primary) !important;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        letter-spacing: 0.5px;
    }
    
    /* Buttons */
    .button, input[type=submit], input[type=button], .submit-row a.deletelink {
        border-radius: 8px !important;
        padding: 8px 18px !important;
        font-weight: 600;
        transition: all 0.2s ease;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
    }
    
    input[type=submit].default, .button.default {
        background: var(--primary) !important;
        color: var(--primary-fg) !important;
        border: 1px solid var(--primary) !important;
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.25);
    }
    
    input[type=submit].default:hover, .button.default:hover {
        background: #0284c7 !important;
        border-color: #0284c7 !important;
        box-shadow: 0 0 18px rgba(56, 189, 248, 0.5);
        transform: translateY(-1px);
    }
    
    input[type=submit]:not(.default), .button:not(.default) {
        background: transparent !important;
        color: #f3f4f6 !important;
        border: 1px solid rgba(243, 244, 246, 0.2) !important;
    }
    
    input[type=submit]:not(.default):hover, .button:not(.default):hover {
        border-color: var(--primary) !important;
        color: var(--primary) !important;
        background: rgba(56, 189, 248, 0.05) !important;
    }

    /* Form Fields */
    input[type=text], input[type=password], input[type=email], input[type=url], input[type=number], textarea, select {
        background: #030712 !important;
        border: 1px solid rgba(56, 189, 248, 0.2) !important;
        border-radius: 6px !important;
        color: var(--body-fg) !important;
        padding: 8px !important;
        transition: all 0.2s ease;
    }
    
    input[type=text]:focus, input[type=password]:focus, input[type=email]:focus, input[type=url]:focus, input[type=number]:focus, textarea:focus, select:focus {
        border-color: var(--primary) !important;
        box-shadow: 0 0 8px rgba(56, 189, 248, 0.4) !important;
        outline: none;
    }

    /* Change Login Page Card Style */
    .login {
        background: #030712 !important;
    }
    
    .login #container {
        background: rgba(11, 19, 41, 0.8) !important;
        border: 1px solid rgba(56, 189, 248, 0.25) !important;
        border-radius: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 25px rgba(56, 189, 248, 0.2) !important;
        overflow: hidden;
        padding: 24px !important;
    }
    
    .login #header {
        background: transparent !important;
        border-bottom: none !important;
        box-shadow: none !important;
        padding: 15px 0 !important;
    }
    
    .login .form-row {
        border-bottom: none !important;
        padding: 15px 0 0 0 !important;
    }
    
    .login label {
        color: var(--body-quiet-color) !important;
        font-weight: 500;
        margin-bottom: 6px;
    }
    
    /* Table Rows hover */
    tbody tr:hover {
        background-color: var(--selected-row) !important;
    }
    
    /* Navigation sidebar adjustments */
    #jail, #content-related, .submit-row {
        background: #0b1329 !important;
        border: 1px solid rgba(56, 189, 248, 0.15) !important;
        border-radius: 12px;
    }
    
    #changelist-filter {
        background: #0b1329 !important;
        border-left: 1px solid rgba(56, 189, 248, 0.15) !important;
    }
    
    #changelist-filter h2 {
        background: rgba(56, 189, 248, 0.1) !important;
        color: var(--primary) !important;
        font-family: 'Space Grotesk', sans-serif;
    }
    
    #changelist-filter a:hover, #changelist-filter li.selected a {
        color: var(--primary) !important;
        font-weight: 600;
    }

    /* Sidebar list item stylings */
    .module td.field-username a, .module th a {
        color: var(--primary) !important;
    }
    
    /* Success messages alerts */
    .messagelist li.success {
        background: var(--message-success-bg) !important;
        color: var(--message-success-color) !important;
        border: 1px solid rgba(74, 222, 128, 0.3) !important;
        border-radius: 6px;
    }

    .messagelist li.warning {
        background: var(--message-warning-bg) !important;
        color: var(--message-warning-color) !important;
        border: 1px solid rgba(251, 146, 60, 0.3) !important;
        border-radius: 6px;
    }

    .messagelist li.error {
        background: var(--message-error-bg) !important;
        color: var(--message-error-color) !important;
        border: 1px solid rgba(248, 113, 113, 0.3) !important;
        border-radius: 6px;
    }
</style>
{% endblock %}
